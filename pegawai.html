<div class="space-y-8 animate-fadeIn" id="pegawai-module">
    <!-- Header Page -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Otoritas & Data Pegawai</h3>
            <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest leading-relaxed">
                Manajemen hak akses & status kehadiran staf &bull; Turbo Sync Aktif
            </p>
        </div>
        <div class="flex gap-2">
            <button onclick="loadPegawaiData(true)" class="w-12 h-12 bg-white border border-slate-200 text-slate-400 rounded-2xl flex items-center justify-center hover:text-amber-500 transition-all shadow-sm active:scale-95">
                <i class="fas fa-sync-alt" id="pegawai-refresh-icon"></i>
            </button>
            <button onclick="openAddPegawaiModal()" class="flex items-center justify-center gap-2 bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] tracking-widest shadow-xl active:scale-95 transition-all uppercase">
                <i class="fas fa-user-plus"></i> Tambah Pegawai
            </button>
        </div>
    </div>

    <!-- Stats Cards (Matching image_8167bb.png) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm flex items-center gap-5">
            <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500 text-xl">
                <i class="fas fa-users"></i>
            </div>
            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Total Pegawai</p>
                <h4 id="stat-total-pegawai" class="text-2xl font-black text-slate-800 mt-1">0 Orang</h4>
            </div>
        </div>
        <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm flex items-center gap-5">
            <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 text-xl">
                <i class="fas fa-shield-halved"></i>
            </div>
            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Admin/Owner</p>
                <h4 id="stat-admin-count" class="text-2xl font-black text-slate-800 mt-1">0 Orang</h4>
            </div>
        </div>
        <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm flex items-center gap-5">
            <div class="w-14 h-14 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500 text-xl">
                <i class="fas fa-user-clock"></i>
            </div>
            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Izin / Off</p>
                <h4 id="stat-off-count" class="text-2xl font-black text-slate-800 mt-1">0 Orang</h4>
            </div>
        </div>
    </div>

    <!-- Employee Table -->
    <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm overflow-hidden min-h-[400px]">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/50 border-b border-slate-100">
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">ID & Nama Pegawai</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Posisi</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">PIN Akses</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="pegawai-table-body" class="divide-y divide-slate-50">
                    <!-- Loading State -->
                    <tr>
                        <td colspan="5" class="px-8 py-32 text-center">
                            <div class="flex flex-col items-center gap-4">
                                <div class="w-10 h-10 border-4 border-slate-100 border-t-amber-400 rounded-full animate-spin"></div>
                                <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Menghubungkan Otoritas...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Form Pegawai -->
<div id="pegawai-modal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onclick="closePegawaiModal()"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-md bg-white rounded-[40px] shadow-2xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h3 id="pegawai-modal-title" class="text-xl font-black text-slate-800 uppercase tracking-tight">Form Pegawai</h3>
            <button onclick="closePegawaiModal()" class="text-slate-300 hover:text-slate-500 transition-colors"><i class="fas fa-times"></i></button>
        </div>
        <form id="pegawai-form" class="space-y-4">
            <input type="hidden" id="pegawai-id-hidden">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Nama Lengkap</label>
                <input type="text" id="pegawai-nama" required class="w-full px-5 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-amber-400 text-sm font-semibold text-slate-700">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Jabatan / Posisi</label>
                    <select id="pegawai-posisi" class="w-full px-5 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-amber-400 text-sm font-semibold text-slate-700">
                        <option value="Owner">Owner</option>
                        <option value="Kasir">Kasir</option>
                        <option value="Koki">Koki</option>
                        <option value="Waiter">Waiter</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">PIN (6 Digit)</label>
                    <input type="password" id="pegawai-pin" maxlength="6" pattern="[0-9]{6}" required class="w-full px-5 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-amber-400 text-sm font-semibold tracking-widest text-slate-700">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Status Kepegawaian</label>
                <select id="pegawai-status" class="w-full px-5 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-amber-400 text-sm font-semibold text-slate-700">
                    <option value="Aktif">Aktif</option>
                    <option value="Izin">Izin</option>
                    <option value="Off">Off</option>
                </select>
            </div>
            <div class="flex items-center gap-3 pt-6">
                <button type="button" onclick="closePegawaiModal()" class="flex-1 py-4 rounded-2xl bg-slate-100 text-slate-400 font-black text-[10px] tracking-widest uppercase">Batal</button>
                <button type="submit" id="pegawai-btn-save" class="flex-[2] py-4 rounded-2xl bg-slate-900 text-white font-black text-[10px] tracking-widest uppercase shadow-xl active:scale-95 transition-all">Simpan Data</button>
            </div>
        </form>
    </div>
</div>

<script id="pegawai-script">
    var API_URL = "https://script.google.com/macros/s/AKfycbwmI9kBYFGuOPH9cnwMK9wuGuYSZcto_EyIW0N2zDTasuW8gkZ8k7PCeVS_PYyzvRgfNg/exec";
    var pegawaiList = [];

    async function loadPegawaiData(force = false) {
        const body = document.getElementById('pegawai-table-body');
        const icon = document.getElementById('pegawai-refresh-icon');
        
        // Turbo Sync: Cek cache lokal
        const cached = localStorage.getItem('master_pegawai');
        if(cached && !force) {
            pegawaiList = JSON.parse(cached);
            renderPegawaiTable(pegawaiList);
            updatePegawaiStats(pegawaiList);
        }

        if(icon) icon.classList.add('fa-spin');

        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'getPegawai' }) 
            });
            const result = await res.json();
            
            if(result.status === 'success') {
                pegawaiList = result.data;
                localStorage.setItem('master_pegawai', JSON.stringify(pegawaiList));
                renderPegawaiTable(pegawaiList);
                updatePegawaiStats(pegawaiList);
            }
        } catch (e) {
            if(!cached) body.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-rose-500 font-black uppercase text-[10px]">Cloud Database Offline</td></tr>`;
        } finally {
            if(icon) icon.classList.remove('fa-spin');
        }
    }

    function renderPegawaiTable(data) {
        const body = document.getElementById('pegawai-table-body');
        if(!body) return;
        
        if(!data || data.length === 0) {
            body.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-slate-300 font-black uppercase text-[10px] tracking-widest">Belum ada pegawai terdaftar</td></tr>`;
            return;
        }

        body.innerHTML = data.map(p => `
            <tr class="hover:bg-slate-50/50 transition-colors group">
                <td class="px-8 py-5">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 font-black text-xs">${p.id.toString().substring(0,2)}</div>
                        <div>
                            <p class="text-sm font-black text-slate-800 uppercase tracking-tight">${p.nama}</p>
                            <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest mt-0.5">ID Staf: ${p.id}</p>
                        </div>
                    </div>
                </td>
                <td class="px-8 py-5">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest bg-slate-100 px-3 py-1 rounded-lg">${p.posisi}</span>
                </td>
                <td class="px-8 py-5 text-center font-mono text-sm tracking-[0.4em] text-slate-300">
                    ••••${p.pin ? p.pin.toString().slice(-2) : '••'}
                </td>
                <td class="px-8 py-5 text-center">
                    <span class="px-3 py-1 rounded-full ${p.status === 'Aktif' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-500'} text-[8px] font-black uppercase tracking-widest">
                        ${p.status}
                    </span>
                </td>
                <td class="px-8 py-5 text-right">
                    <div class="flex items-center justify-end gap-2">
                        <button onclick="editPegawai('${p.id}')" class="w-8 h-8 rounded-xl bg-slate-50 text-slate-300 hover:text-amber-500 hover:bg-amber-50 transition-all flex items-center justify-center text-xs"><i class="fas fa-user-edit"></i></button>
                        <button onclick="deletePegawai('${p.id}')" class="w-8 h-8 rounded-xl bg-slate-50 text-slate-300 hover:text-rose-500 hover:bg-rose-50 transition-all flex items-center justify-center text-xs"><i class="fas fa-user-minus"></i></button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function updatePegawaiStats(data) {
        document.getElementById('stat-total-pegawai').innerText = `${data.length} Orang`;
        document.getElementById('stat-admin-count').innerText = `${data.filter(p => p.posisi === 'Owner' || p.posisi === 'Admin').length} Orang`;
        document.getElementById('stat-off-count').innerText = `${data.filter(p => p.status !== 'Aktif').length} Orang`;
    }

    // Modal & Form Logic
    function openAddPegawaiModal() {
        document.getElementById('pegawai-modal-title').innerText = "Tambah Pegawai Baru";
        document.getElementById('pegawai-form').reset();
        document.getElementById('pegawai-id-hidden').value = "";
        document.getElementById('pegawai-modal').classList.remove('hidden');
    }

    function editPegawai(id) {
        const p = pegawaiList.find(item => item.id == id);
        if(!p) return;
        document.getElementById('pegawai-modal-title').innerText = "Edit Data Pegawai";
        document.getElementById('pegawai-id-hidden').value = p.id;
        document.getElementById('pegawai-nama').value = p.nama;
        document.getElementById('pegawai-posisi').value = p.posisi;
        document.getElementById('pegawai-status').value = p.status;
        document.getElementById('pegawai-pin').value = p.pin;
        document.getElementById('pegawai-modal').classList.remove('hidden');
    }

    function closePegawaiModal() { document.getElementById('pegawai-modal').classList.add('hidden'); }

    document.getElementById('pegawai-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('pegawai-btn-save');
        const id = document.getElementById('pegawai-id-hidden').value;
        const action = id ? 'submitPegawai' : 'submitPegawai'; // Sesuai ketersediaan di code.gs
        
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-circle-notch animate-spin mr-2"></i> Memproses...`;

        const payload = {
            action: action,
            data: {
                id: id,
                nama: document.getElementById('pegawai-nama').value,
                posisi: document.getElementById('pegawai-posisi').value,
                pin: document.getElementById('pegawai-pin').value,
                status: document.getElementById('pegawai-status').value
            }
        };

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.status === 'success') {
                closePegawaiModal();
                loadPegawaiData(true);
            }
        } catch (err) {
            alert("Sinkronisasi gagal. Pastikan API URL benar.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Simpan Data";
        }
    });

    async function deletePegawai(id) {
        if(!confirm("Hapus akses pegawai ini secara permanen?")) return;
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'deletePegawai', data: { id: id } }) 
            });
            const result = await res.json();
            if(result.status === 'success') loadPegawaiData(true);
        } catch (e) { alert("Gagal menghapus data."); }
    }

    // Inisialisasi awal modul
    setTimeout(loadPegawaiData, 100);
</script>
