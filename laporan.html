<div class="space-y-8 animate-fadeIn">
    <!-- Header Page -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Rekapitulasi Penjualan</h3>
            <p class="text-xs font-bold text-slate-400 mt-1">Pantau performa bisnis dan arus kas masuk</p>
        </div>
        <div class="flex gap-2">
            <button onclick="exportToExcel()" class="flex items-center justify-center gap-2 bg-white border border-slate-200 text-slate-600 px-5 py-3 rounded-2xl font-black text-[10px] tracking-widest shadow-sm active:scale-95 transition-all">
                <i class="fas fa-file-excel text-emerald-500"></i> EXPORT EXCEL
            </button>
            <button onclick="refreshLaporan()" class="flex items-center justify-center gap-2 bg-slate-900 text-white px-5 py-3 rounded-2xl font-black text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">
                <i class="fas fa-sync-alt"></i> REFRESH DATA
            </button>
        </div>
    </div>

    <!-- Summary Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Omzet -->
        <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm relative overflow-hidden group">
            <div class="relative z-10">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Total Omzet</p>
                <h4 id="stat-omzet" class="text-2xl font-black text-slate-800 mt-2">Rp 0</h4>
                <div class="flex items-center gap-2 mt-4">
                    <span class="px-2 py-0.5 rounded-lg bg-emerald-50 text-emerald-600 text-[9px] font-black italic">Sesuai Target</span>
                </div>
            </div>
            <i class="fas fa-sack-dollar absolute -right-4 -bottom-4 text-7xl text-slate-50 group-hover:text-amber-50 transition-colors"></i>
        </div>

        <!-- Volume -->
        <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm relative overflow-hidden group">
            <div class="relative z-10">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Total Pesanan</p>
                <h4 id="stat-pesanan" class="text-2xl font-black text-slate-800 mt-2">0 Transaksi</h4>
                <div class="flex items-center gap-2 mt-4">
                    <span id="stat-avg" class="px-2 py-0.5 rounded-lg bg-indigo-50 text-indigo-600 text-[9px] font-black italic">Rata-rata: Rp 0</span>
                </div>
            </div>
            <i class="fas fa-receipt absolute -right-4 -bottom-4 text-7xl text-slate-50 group-hover:text-indigo-50 transition-colors"></i>
        </div>

        <!-- Delivery Mix -->
        <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Metode Penyajian</p>
            <div class="space-y-3">
                <div>
                    <div class="flex justify-between text-[10px] font-black uppercase mb-1">
                        <span class="text-slate-600">Makan di Sini</span>
                        <span id="label-dinein">0%</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div id="bar-dinein" class="h-full bg-amber-400" style="width: 0%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-[10px] font-black uppercase mb-1">
                        <span class="text-slate-600">Bungkus</span>
                        <span id="label-takeaway">0%</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div id="bar-takeaway" class="h-full bg-slate-400" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data Table -->
    <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm overflow-hidden">
        <div class="p-6 border-b border-slate-50 flex items-center justify-between">
            <h4 class="text-[10px] font-black text-slate-800 uppercase tracking-widest">Rincian Transaksi Terbaru</h4>
            <div class="relative">
                <input type="text" id="report-search" oninput="filterLaporan()" placeholder="Cari ID/Meja..." class="bg-slate-50 border-none rounded-xl px-4 py-2 text-[10px] font-bold focus:ring-1 focus:ring-amber-400 w-48">
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50/50">
                        <th class="px-8 py-5 text-[9px] font-black text-slate-400 uppercase tracking-widest">Waktu & ID</th>
                        <th class="px-8 py-5 text-[9px] font-black text-slate-400 uppercase tracking-widest">Tipe / Meja</th>
                        <th class="px-8 py-5 text-[9px] font-black text-slate-400 uppercase tracking-widest">Pesanan</th>
                        <th class="px-8 py-5 text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Bayar</th>
                        <th class="px-8 py-5 text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="report-table-body" class="divide-y divide-slate-50">
                    <!-- Loading state -->
                    <tr>
                        <td colspan="5" class="py-20 text-center">
                            <div class="flex flex-col items-center gap-3">
                                <i class="fas fa-circle-notch animate-spin text-amber-400 text-2xl"></i>
                                <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Menghubungkan ke Cloud...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Pastikan API_URL sama dengan yang di index.html
    const API_URL = "https://script.google.com/macros/s/AKfycbwmI9kBYFGuOPH9cnwMK9wuGuYSZcto_EyIW0N2zDTasuW8gkZ8k7PCeVS_PYyzvRgfNg/exec";
    let reportData = [];

    async function refreshLaporan() {
        const body = document.getElementById('report-table-body');
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getOrders' })
            });
            const result = await res.json();
            
            if(result.status === 'success') {
                // Urutkan dari yang terbaru (berdasarkan timestamp)
                reportData = result.data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                renderReportTable(reportData);
                calculateLaporanStats(reportData);
            }
        } catch (e) {
            body.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-rose-500 font-bold uppercase text-[10px]">Gagal memuat laporan dari Google Sheets</td></tr>`;
        }
    }

    function renderReportTable(data) {
        const body = document.getElementById('report-table-body');
        
        if (data.length === 0) {
            body.innerHTML = `<tr><td colspan="5" class="py-20 text-center text-slate-400 font-bold uppercase text-[10px]">Belum ada data transaksi</td></tr>`;
            return;
        }

        body.innerHTML = data.map(ord => {
            // Parsing items yang disimpan sebagai string JSON di sheet
            let itemsText = "";
            try {
                const items = typeof ord.items === 'string' ? JSON.parse(ord.items) : ord.items;
                itemsText = items.map(i => `${i.qty}x ${i.nama || i.name}`).join(', ');
            } catch(e) { itemsText = "Detail tidak tersedia"; }

            const date = new Date(ord.timestamp);
            const timeStr = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const dateStr = date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });

            return `
                <tr class="hover:bg-slate-50/80 transition-colors group">
                    <td class="px-8 py-5">
                        <p class="text-[11px] font-black text-slate-800 uppercase tracking-tight">${timeStr} • ${dateStr}</p>
                        <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">ID: ${ord.id}</p>
                    </td>
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full ${ord.tipe === 'Take Away' ? 'bg-slate-400' : 'bg-amber-400'}"></span>
                            <p class="text-[10px] font-black text-slate-700 uppercase">${ord.tipe || 'Dine In'} / Meja ${ord.meja}</p>
                        </div>
                    </td>
                    <td class="px-8 py-5 max-w-xs">
                        <p class="text-[10px] font-semibold text-slate-500 truncate" title="${itemsText}">${itemsText}</p>
                    </td>
                    <td class="px-8 py-5">
                        <p class="text-sm font-black text-slate-800 tracking-tighter">Rp ${parseInt(ord.total).toLocaleString()}</p>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <span class="px-3 py-1 rounded-full ${ord.status === 'Selesai' ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'} text-[8px] font-black uppercase tracking-widest">
                            ${ord.status}
                        </span>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function calculateLaporanStats(data) {
        const totalOmzet = data.reduce((a, b) => a + parseInt(b.total || 0), 0);
        const totalPesanan = data.length;
        const avg = totalPesanan > 0 ? Math.round(totalOmzet / totalPesanan) : 0;

        document.getElementById('stat-omzet').innerText = `Rp ${totalOmzet.toLocaleString()}`;
        document.getElementById('stat-pesanan').innerText = `${totalPesanan} Transaksi`;
        document.getElementById('stat-avg').innerText = `Rata-rata: Rp ${avg.toLocaleString()}`;

        // Mix Ratio
        const dineInCount = data.filter(d => d.tipe === 'Dine In' || !d.tipe).length;
        const takeawayCount = totalPesanan - dineInCount;
        
        const dineInPct = totalPesanan > 0 ? Math.round((dineInCount / totalPesanan) * 100) : 0;
        const takeawayPct = totalPesanan > 0 ? 100 - dineInPct : 0;

        document.getElementById('label-dinein').innerText = `${dineInPct}%`;
        document.getElementById('bar-dinein').style.width = `${dineInPct}%`;
        document.getElementById('label-takeaway').innerText = `${takeawayPct}%`;
        document.getElementById('bar-takeaway').style.width = `${takeawayPct}%`;
    }

    function filterLaporan() {
        const query = document.getElementById('report-search').value.toLowerCase();
        const filtered = reportData.filter(ord => 
            ord.id.toLowerCase().includes(query) || 
            ord.meja.toString().toLowerCase().includes(query)
        );
        renderReportTable(filtered);
    }

    function exportToExcel() {
        alert("Fungsi Export CSV sedang disiapkan. Data akan langsung terunduh ke komputer Anda.");
        // Logika export CSV bisa ditambahkan di sini
    }

    // Load data saat pertama kali modul muncul
    refreshLaporan();
</script>
