<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu RM PANGKALAN - Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .status-dot::after { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: currentColor; margin-left: 6px; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .active-type { @apply border-amber-400 bg-amber-50 text-amber-600 !important; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-32">

    <!-- Header Section -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-slate-100 shadow-sm px-4 py-4">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div onclick="adminSecretTap()" class="w-10 h-10 bg-amber-400 rounded-2xl flex items-center justify-center shadow-lg shadow-amber-200 cursor-pointer">
                    <i class="fas fa-utensils text-slate-900"></i>
                </div>
                <div>
                    <h1 class="text-base font-black text-slate-800 leading-none tracking-tight">RM PANGKALAN</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="table-display" class="text-[9px] font-black bg-slate-900 text-white px-1.5 py-0.5 rounded tracking-widest uppercase">Memuat...</span>
                        <span id="connection-status" class="text-[9px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded uppercase tracking-widest">Online</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <a href="admin.html" class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-200 hover:text-slate-400">
                    <i class="fas fa-lock text-[10px]"></i>
                </a>
                <button onclick="toggleSearch()" class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500">
                    <i class="fas fa-search"></i>
                </button>
                <button onclick="openHistoryModal()" class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 relative">
                    <i class="fas fa-list-check"></i>
                    <span id="history-badge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-amber-500 text-slate-900 text-[8px] font-black rounded-full flex items-center justify-center border-2 border-white">0</span>
                </button>
            </div>
        </div>
        
        <!-- Search Input -->
        <div id="search-bar" class="hidden max-w-2xl mx-auto mt-4 px-2">
            <input type="text" id="menu-search" oninput="renderMenu()" placeholder="Cari menu favorit..." class="w-full px-4 py-2 rounded-xl bg-slate-100 border-none focus:ring-2 focus:ring-amber-400 text-sm font-medium">
        </div>
    </header>

    <main class="max-w-2xl mx-auto mt-6 px-4">
        <!-- Banner Promo -->
        <div class="mb-8 relative rounded-[32px] overflow-hidden bg-slate-900 aspect-[16/9] shadow-2xl shadow-slate-200">
            <img src="https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover opacity-60" id="banner-img">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent p-6 flex flex-col justify-end">
                <span class="w-fit bg-amber-400 text-slate-900 text-[8px] font-black px-2 py-0.5 rounded-full mb-2 uppercase tracking-widest">Spesial</span>
                <h2 class="text-2xl font-black text-white leading-tight uppercase tracking-tight">Ayam Bakar Madu</h2>
                <div class="flex items-center gap-3 mt-4">
                    <span class="text-amber-400 font-black text-lg">Rp 25.000</span>
                    <button onclick="addToCart(1)" class="bg-white text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black shadow-lg active:scale-95 transition-transform">PESAN SEKARANG</button>
                </div>
            </div>
        </div>

        <!-- Menu Grid -->
        <div id="menu-container" class="grid grid-cols-1 gap-4 pb-10">
            <!-- Items injected by JS -->
        </div>

        <footer class="mt-10 mb-20 text-center">
            <p class="text-[10px] text-slate-300 font-medium tracking-widest uppercase">© 2024 RM PANGKALAN System</p>
            <a href="admin.html" class="text-[10px] text-slate-200 hover:text-slate-400 mt-2 inline-block transition-colors underline decoration-slate-100">Staff Portal</a>
        </footer>
    </main>

    <!-- Floating Actions -->
    <div class="fixed bottom-32 right-6 z-40 flex flex-col gap-3">
        <button onclick="callWaiter()" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-2xl flex items-center justify-center active:scale-90 transition-all">
            <i class="fas fa-concierge-bell text-xl"></i>
        </button>
    </div>

    <!-- Bottom Bar -->
    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-50 transform translate-y-32 transition-all duration-500 max-w-2xl mx-auto">
        <div class="bg-slate-900/95 backdrop-blur-xl rounded-3xl p-4 shadow-2xl flex items-center justify-between border border-white/10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-400 rounded-2xl flex items-center justify-center text-slate-900 shadow-inner relative">
                    <i class="fas fa-shopping-basket text-xl"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-black w-6 h-6 rounded-full border-2 border-slate-900 flex items-center justify-center">0</span>
                </div>
                <div>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total</p>
                    <p id="cart-total-display" class="text-xl font-black text-white tracking-tighter">Rp 0</p>
                </div>
            </div>
            <button onclick="openCartModal()" class="bg-white text-slate-900 px-6 py-4 rounded-2xl font-black text-xs shadow-xl active:scale-95 transition-all">KONFIRMASI</button>
        </div>
    </div>

    <!-- Modal Keranjang -->
    <div id="cart-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onclick="closeCartModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[40px] p-8 max-h-[90vh] flex flex-col shadow-2xl animate-slideUp max-w-2xl mx-auto">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight mb-6">Pesanan Anda</h3>
            
            <div id="modal-items-list" class="flex-1 overflow-y-auto space-y-4 no-scrollbar pr-2">
                <!-- Injected items -->
            </div>

            <div class="mt-8 grid grid-cols-2 gap-3">
                <button onclick="setOrderType('Dine In')" id="type-dinein" class="py-3 rounded-2xl border-2 border-slate-100 text-[10px] font-black uppercase tracking-widest transition-all">Makan Sini</button>
                <button onclick="setOrderType('Take Away')" id="type-takeaway" class="py-3 rounded-2xl border-2 border-slate-100 text-[10px] font-black uppercase tracking-widest transition-all">Bungkus</button>
            </div>

            <div class="mt-6 pt-6 border-t border-slate-100 flex items-center justify-between mb-4">
                <span class="text-sm font-bold text-slate-400 uppercase">Total Bayar</span>
                <span id="modal-total" class="text-xl font-black text-amber-600">Rp 0</span>
            </div>
            
            <button onclick="confirmOrder()" id="btn-submit" class="w-full bg-slate-900 text-white py-5 rounded-[24px] font-black text-sm shadow-xl active:scale-95 transition-all">
                KIRIM PESANAN
            </button>
        </div>
    </div>

    <!-- Modal History -->
    <div id="history-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onclick="closeHistoryModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-slate-50 rounded-t-[40px] p-8 max-h-[80vh] flex flex-col shadow-2xl animate-slideUp max-w-2xl mx-auto">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight mb-6">Riwayat Pesanan</h3>
            <div id="history-list" class="flex-1 overflow-y-auto space-y-4 no-scrollbar">
                <!-- Injected history -->
            </div>
            <button onclick="closeHistoryModal()" class="mt-6 w-full py-4 bg-white border border-slate-200 rounded-2xl font-black text-[10px] tracking-widest uppercase">Tutup</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwmI9kBYFGuOPH9cnwMK9wuGuYSZcto_EyIW0N2zDTasuW8gkZ8k7PCeVS_PYyzvRgfNg/exec";
        
        // Fix: Use Base64 to avoid quote conflicts inside HTML attributes
        const NO_IMAGE = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgMjQgMjQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2NiZDVlMSIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiPjxyZWN0IHdpZHRoPSIxOCIgaGVpZ2h0PSIxOCIgeD0iMyIgeT0iMyIgcng9IjIiIHJ5PSIyIj48L3JlY3Q+PGNpcmNsZSBjeD0iOSIgY3k9IjkiIHI9IjIiPjwvY2lyY2xlPjxwYXRoIGQ9Im0yMSAxNS0zLjA4Ni0zLjA4NmEyIDIgMCAwIDAtMi44MjggMEw2IDIxIj48L3BhdGg+PC9zdmc+";

        let cart = [];
        let menuItems = [
            {id: 1, nama: "Ayam Bakar Madu", harga: 25000, img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400", kategori: "Makanan"},
            {id: 2, nama: "Es Teh Manis", harga: 5000, img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400", kategori: "Minuman"},
            {id: 3, nama: "Nasi Goreng Pangkalan", harga: 20000, img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=400", kategori: "Makanan"},
            {id: 4, nama: "Es Jeruk Peras", harga: 8000, img: "https://images.unsplash.com/photo-1621506289937-48a4df457635?w=400", kategori: "Minuman"}
        ];

        let tableNumber = new URLSearchParams(window.location.search).get('meja') || "Umum";
        let orderType = "Dine In";
        let tapCount = 0;

        window.onload = () => {
            document.getElementById('table-display').innerText = `Meja ${tableNumber}`;
            const banner = document.getElementById('banner-img');
            if (banner) banner.onerror = function() { this.src = NO_IMAGE; this.onerror = null; };
            setOrderType('Dine In');
            fetchMenu(); 
            updateCartUI();
        };

        async function fetchMenu() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getMenu' })
                });
                const result = await res.json();
                if(result.status === 'success' && result.data && result.data.length > 0) {
                    menuItems = result.data;
                }
            } catch (e) {
                console.warn("Backend offline, menggunakan data lokal.");
            }
            renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            if (!container) return;
            
            const searchInput = document.getElementById('menu-search');
            const searchVal = searchInput ? searchInput.value.toLowerCase() : "";
            
            const filtered = menuItems.filter(i => {
                const nameText = i.nama || i.name || ""; 
                return nameText.toString().toLowerCase().includes(searchVal);
            });
            
            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-slate-400 text-xs font-bold uppercase tracking-widest">Menu tidak ditemukan</p>`;
                return;
            }

            container.innerHTML = filtered.map(item => {
                const name = item.nama || item.name || "Menu Tanpa Nama";
                const price = item.harga || item.price || 0;
                const image = item.img || item.image || "";

                return `
                <div class="bg-white p-3 rounded-2xl border border-slate-100 flex items-center gap-4 shadow-sm animate-fadeIn">
                    <img src="${image}" class="w-20 h-20 rounded-xl object-cover bg-slate-50" 
                         onerror="this.src='${NO_IMAGE}'; this.onerror=null;">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h4 class="text-sm font-black text-slate-800 uppercase tracking-tight">${name}</h4>
                        </div>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-sm font-black text-amber-600 tracking-tighter">Rp ${parseInt(price).toLocaleString()}</span>
                            <button onclick="addToCart(${item.id})" class="w-9 h-9 bg-amber-400 rounded-xl flex items-center justify-center shadow-lg shadow-amber-200 active:scale-90 transition-all">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function addToCart(id) {
            const item = menuItems.find(i => i.id == id);
            if (!item) return;

            const name = item.nama || item.name;
            const price = item.harga || item.price;

            const inCart = cart.find(i => i.id == id);
            if(inCart) {
                inCart.qty++;
            } else {
                cart.push({ ...item, id: id, nama: name, harga: price, qty: 1, note: "" });
            }
            updateCartUI();
            
            const badge = document.getElementById('cart-badge');
            if (badge) {
                badge.classList.add('animate-bounce');
                setTimeout(() => badge.classList.remove('animate-bounce'), 300);
            }
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            if (!bar) return;
            
            const qty = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.qty * (b.harga || b.price || 0)), 0);
            
            if(qty > 0) {
                bar.classList.remove('translate-y-32');
            } else {
                bar.classList.add('translate-y-32');
            }
            
            const badge = document.getElementById('cart-badge');
            const totalDisplay = document.getElementById('cart-total-display');
            if (badge) badge.innerText = qty;
            if (totalDisplay) totalDisplay.innerText = `Rp ${total.toLocaleString()}`;
        }

        function setOrderType(type) {
            orderType = type;
            const dineInBtn = document.getElementById('type-dinein');
            const takeawayBtn = document.getElementById('type-takeaway');
            
            if (dineInBtn) dineInBtn.classList.remove('active-type');
            if (takeawayBtn) takeawayBtn.classList.remove('active-type');
            
            if(type === 'Dine In' && dineInBtn) dineInBtn.classList.add('active-type');
            else if (takeawayBtn) takeawayBtn.classList.add('active-type');
        }

        function openCartModal() {
            const list = document.getElementById('modal-items-list');
            if (!list) return;

            list.innerHTML = cart.map((item, index) => {
                const name = item.nama || item.name;
                const price = item.harga || item.price || 0;
                return `
                <div class="flex items-center justify-between border-b border-slate-50 pb-4">
                    <div class="flex-1">
                        <h5 class="text-xs font-black text-slate-800 uppercase">${name}</h5>
                        <p class="text-[10px] font-bold text-amber-600">Rp ${parseInt(price).toLocaleString()}</p>
                        <input type="text" onchange="updateNote(${index}, this.value)" value="${item.note || ''}" placeholder="Catatan: Tidak pedas, dll..." class="mt-2 w-full bg-slate-50 border-none rounded-lg py-1 px-3 text-[9px] focus:ring-1 focus:ring-amber-400">
                    </div>
                    <div class="flex items-center gap-3 ml-4">
                        <button onclick="changeQty(${index}, -1)" class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center active:bg-slate-200"><i class="fas fa-minus text-[8px]"></i></button>
                        <span class="text-sm font-black w-4 text-center">${item.qty}</span>
                        <button onclick="changeQty(${index}, 1)" class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center active:bg-slate-200"><i class="fas fa-plus text-[8px]"></i></button>
                    </div>
                </div>
                `;
            }).join('');
            
            const total = cart.reduce((a, b) => a + (b.qty * (b.harga || b.price || 0)), 0);
            const totalDisplay = document.getElementById('modal-total');
            if (totalDisplay) totalDisplay.innerText = `Rp ${total.toLocaleString()}`;
            
            const modal = document.getElementById('cart-modal');
            if (modal) modal.classList.remove('hidden');
        }

        function updateNote(i, v) { if (cart[i]) cart[i].note = v; }
        
        function changeQty(i, d) {
            if (!cart[i]) return;
            cart[i].qty += d;
            if(cart[i].qty <= 0) cart.splice(i, 1);
            if(cart.length === 0) closeCartModal(); else openCartModal();
            updateCartUI();
        }

        function closeCartModal() { 
            const modal = document.getElementById('cart-modal');
            if (modal) modal.classList.add('hidden'); 
        }
        
        function toggleSearch() { 
            const bar = document.getElementById('search-bar');
            if (bar) {
                bar.classList.toggle('hidden'); 
                if(!bar.classList.contains('hidden')) {
                    const input = document.getElementById('menu-search');
                    if (input) input.focus();
                }
            }
        }

        async function confirmOrder() {
            if(cart.length === 0) return;
            const btn = document.getElementById('btn-submit');
            if (!btn) return;

            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner animate-spin mr-2"></i> MENGIRIM...`;
            btn.disabled = true;

            const order = {
                id: 'ORD' + Math.floor(Math.random() * 9000 + 1000),
                table: tableNumber,
                type: orderType,
                items: cart,
                total: cart.reduce((a, b) => a + (b.qty * (b.harga || b.price || 0)), 0)
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'submitOrder', data: order })
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    const history = JSON.parse(localStorage.getItem('confirmed_orders') || '[]');
                    history.push({ ...order, timestamp: new Date().toISOString(), status: 'Menunggu' });
                    localStorage.setItem('confirmed_orders', JSON.stringify(history));
                    
                    alert("Pesanan Anda Berhasil Dikirim!");
                    cart = [];
                    updateCartUI();
                    closeCartModal();
                    updateHistoryUI();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                alert("Koneksi bermasalah. Pesanan disimpan di riwayat lokal.");
                const history = JSON.parse(localStorage.getItem('confirmed_orders') || '[]');
                history.push({ ...order, timestamp: new Date().toISOString(), status: 'Offline' });
                localStorage.setItem('confirmed_orders', JSON.stringify(history));
                cart = [];
                updateCartUI();
                closeCartModal();
                updateHistoryUI();
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function openHistoryModal() {
            updateHistoryUI();
            const modal = document.getElementById('history-modal');
            if (modal) modal.classList.remove('hidden');
        }
        
        function closeHistoryModal() { 
            const modal = document.getElementById('history-modal');
            if (modal) modal.classList.add('hidden'); 
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            if (!list) return;
            
            const history = JSON.parse(localStorage.getItem('confirmed_orders') || '[]');
            const badge = document.getElementById('history-badge');
            
            if (badge) {
                badge.innerText = history.length;
                if(history.length > 0) badge.classList.remove('hidden'); else badge.classList.add('hidden');
            }

            if(history.length === 0) {
                list.innerHTML = `<p class="text-center text-slate-300 py-10 text-[10px] font-bold uppercase tracking-widest">Belum ada pesanan.</p>`;
                return;
            }

            list.innerHTML = history.reverse().map(ord => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm animate-fadeIn">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black text-slate-300 tracking-tighter uppercase">#${ord.id}</span>
                        <span class="px-2 py-0.5 bg-amber-50 text-amber-600 text-[8px] font-black rounded-full status-dot uppercase">${ord.status}</span>
                    </div>
                    <div class="text-[10px] font-bold text-slate-700 space-y-1">
                        ${ord.items.map(i => `<div>${i.qty}x ${i.nama || i.name}</div>`).join('')}
                    </div>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-50">
                        <span class="text-[9px] text-slate-400 font-bold tracking-tight uppercase">${ord.type}</span>
                        <p class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">Total Rp ${parseInt(ord.total).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function callWaiter() { alert("Pelayan akan segera datang ke Meja " + tableNumber); }
        
        function adminSecretTap() {
            tapCount++;
            if(tapCount >= 5) window.location.href = "admin.html";
            setTimeout(() => tapCount = 0, 2000);
        }
    </script>
</body>
</html>
