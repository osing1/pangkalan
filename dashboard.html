<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - RM PANGKALAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .nav-active { 
            background: rgba(251, 191, 36, 0.1); 
            color: #fbbf24;
            border-right: 4px solid #fbbf24;
        }

        #content-area { transition: all 0.3s ease; }
        .fade-out { opacity: 0; transform: translateY(10px); }
        
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @media (max-width: 1024px) {
            .sidebar-hidden { transform: translateX(-100%); }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar Navigasi -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 sidebar-transition lg:relative lg:translate-x-0 sidebar-hidden">
            <div class="flex flex-col h-full">
                <!-- Header Brand -->
                <div class="p-6 flex items-center space-x-3 border-b border-slate-800">
                    <div class="w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                        <i class="fas fa-utensils text-slate-900 text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-black text-white leading-none tracking-tight uppercase">Pangkalan</h1>
                        <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Admin Panel</span>
                    </div>
                </div>

                <!-- Menu Navigasi -->
                <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-8">
                    <div>
                        <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Ringkasan</p>
                        <div class="space-y-1">
                            <button onclick="navigate('dashboard.html', this)" class="nav-btn w-full flex items-center px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-800 hover:text-white group">
                                <i class="fas fa-chart-pie w-6 text-lg group-hover:text-amber-400"></i>
                                <span>Dashboard</span>
                            </button>
                            <button onclick="navigate('pos.html', this)" class="nav-btn w-full flex items-center px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-800 hover:text-white group">
                                <i class="fas fa-cash-register w-6 text-lg group-hover:text-amber-400"></i>
                                <span>Kasir (POS)</span>
                            </button>
                        </div>
                    </div>

                    <div>
                        <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Manajemen</p>
                        <div class="space-y-1">
                            <button onclick="navigate('admin_menu.html', this)" class="nav-btn w-full flex items-center px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-800 hover:text-white group">
                                <i class="fas fa-list-ul w-6 text-lg group-hover:text-amber-400"></i>
                                <span>Kelola Menu</span>
                            </button>
                            <button onclick="navigate('stok.html', this)" class="nav-btn w-full flex items-center px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-800 hover:text-white group">
                                <i class="fas fa-boxes-stacked w-6 text-lg group-hover:text-amber-400"></i>
                                <span>Inventori Stok</span>
                            </button>
                            <button onclick="navigate('pegawai.html', this)" class="nav-btn w-full flex items-center px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-800 hover:text-white group">
                                <i class="fas fa-user-tie w-6 text-lg group-hover:text-amber-400"></i>
                                <span>Pegawai</span>
                            </button>
                        </div>
                    </div>

                    <div>
                        <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Laporan</p>
                        <div class="space-y-1">
                            <button onclick="navigate('laporan.html', this)" class="nav-btn w-full flex items-center px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-800 hover:text-white group">
                                <i class="fas fa-file-invoice-dollar w-6 text-lg group-hover:text-amber-400"></i>
                                <span>Rekap Penjualan</span>
                            </button>
                        </div>
                    </div>
                </nav>

                <!-- Footer Sidebar -->
                <div class="p-4 bg-slate-950/50">
                    <div class="flex items-center p-3 rounded-xl bg-slate-800/40 border border-slate-700/50">
                        <div class="w-10 h-10 rounded-lg bg-amber-400 flex items-center justify-center text-slate-900 font-black shadow-inner">
                            AD
                        </div>
                        <div class="ml-3 overflow-hidden">
                            <p class="text-xs font-bold text-white truncate">Administrator</p>
                            <p class="text-[9px] text-slate-500 truncate uppercase font-bold tracking-tighter">Owner Access</p>
                        </div>
                        <a href="index.html" class="ml-auto text-slate-500 hover:text-rose-400 transition-colors" title="Keluar ke Menu Pelanggan">
                            <i class="fas fa-power-off"></i>
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Area Kerja Utama -->
        <div class="flex-1 flex flex-col min-w-0 bg-slate-50 relative">
            
            <!-- Header Workspace -->
            <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-6 lg:px-10 z-30 shadow-sm">
                <div class="flex items-center space-x-4">
                    <button onclick="toggleSidebar()" class="lg:hidden text-slate-600 p-2 hover:bg-slate-100 rounded-lg">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <div>
                        <h2 id="page-title" class="text-xl font-black text-slate-800 tracking-tight uppercase">Dashboard</h2>
                        <div class="flex items-center gap-2 mt-0.5">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            <p id="page-subtitle" class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Sistem Aktif</p>
                        </div>
                    </div>
                </div>

                <div class="flex items-center space-x-6">
                    <div class="hidden md:flex flex-col items-end border-r border-slate-200 pr-6">
                        <span id="real-time-clock" class="text-sm font-black text-slate-700 tabular-nums">00:00:00</span>
                        <span id="real-time-date" class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Memuat...</span>
                    </div>

                    <div class="flex items-center space-x-2">
                        <button class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-slate-50 rounded-xl transition-all border border-transparent hover:border-slate-200">
                            <i class="fas fa-bell"></i>
                        </button>
                        <button class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-slate-50 rounded-xl transition-all border border-transparent hover:border-slate-200">
                            <i class="fas fa-gear"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Area Konten Dinamis -->
            <main class="flex-1 overflow-y-auto relative p-6 lg:p-10">
                <div class="max-w-[1600px] mx-auto">
                    <div id="content-area">
                        <div class="flex flex-col items-center justify-center h-[50vh] text-slate-300">
                            <div class="w-12 h-12 border-4 border-slate-100 border-t-amber-400 rounded-full animate-spin mb-4"></div>
                            <p class="text-[10px] font-black uppercase tracking-[0.2em]">Menyiapkan Sistem...</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 hidden lg:hidden"></div>

    <script>
        /**
         * Navigasi Modul Admin
         * Perbaikan: Penanganan protokol non-http (seperti blob: pada AI preview)
         */
        async function navigate(pageUrl, element) {
            if (!pageUrl) return;
            
            const contentArea = document.getElementById('content-area');
            const pageTitle = document.getElementById('page-title');
            const pageSubtitle = document.getElementById('page-subtitle');
            
            if (!contentArea) return;

            // Tutup sidebar di mobile
            if (window.innerWidth < 1024) {
                const sidebar = document.getElementById('sidebar');
                if (sidebar && !sidebar.classList.contains('sidebar-hidden')) toggleSidebar();
            }

            contentArea.classList.add('fade-out');

            try {
                // Deteksi jika kita berada di lingkungan preview AI (blob:)
                if (window.location.protocol === 'blob:' || window.location.protocol === 'about:') {
                    throw new Error("PREVIEW_MODE");
                }

                // Fetch standar untuk GitHub Pages atau Server Lokal
                const response = await fetch('./' + pageUrl);
                if (!response.ok) throw new Error(`NOT_FOUND`);
                
                const html = await response.text();
                
                setTimeout(() => {
                    contentArea.innerHTML = html;
                    updateHeaderInfo(element, pageTitle, pageSubtitle);
                    finalizeNavigation(element, pageUrl);
                }, 300);

            } catch (error) {
                console.warn('Info Navigasi:', error.message);
                
                let errorMsg = `File "${pageUrl}" tidak ditemukan. Pastikan Anda sudah mengunggah file tersebut ke GitHub.`;
                let icon = "fa-triangle-exclamation";
                let title = "Halaman Tidak Ditemukan";

                if (error.message === "PREVIEW_MODE") {
                    title = "Siap Dipublikasikan";
                    icon = "fa-rocket";
                    errorMsg = `Sistem navigasi multi-file tidak dapat dijalankan di jendela Preview AI ini. <br><br><b>Unggah file Anda ke GitHub Pages</b> untuk melihat dashboard, kasir, dan laporan berjalan secara otomatis.`;
                }

                contentArea.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-[50vh] text-center">
                        <div class="w-20 h-20 bg-amber-50 rounded-3xl flex items-center justify-center text-amber-500 mb-6 shadow-sm border border-amber-100">
                            <i class="fas ${icon} text-3xl"></i>
                        </div>
                        <h2 class="text-lg font-black text-slate-800 uppercase tracking-tight">${title}</h2>
                        <div class="text-slate-400 max-w-sm mt-2 text-xs font-semibold uppercase tracking-wider leading-relaxed px-4">
                            ${errorMsg}
                        </div>
                        <button onclick="location.reload()" class="mt-8 px-8 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-xl hover:shadow-slate-200 transition-all">Segarkan</button>
                    </div>`;
                
                // Tetap update state menu meskipun fetch gagal di preview
                updateHeaderInfo(element, pageTitle, pageSubtitle);
                finalizeNavigation(element, pageUrl);
            }
        }

        function updateHeaderInfo(element, titleEl, subtitleEl) {
            if (element) {
                const btnText = element.querySelector('span').innerText;
                titleEl.innerText = btnText;
                
                const subtitles = {
                    'Dashboard': 'Ringkasan Operasional Hari Ini',
                    'Kasir (POS)': 'Input Transaksi Penjualan',
                    'Kelola Menu': 'Pengaturan Katalog Makanan & Minuman',
                    'Inventori Stok': 'Manajemen Stok Bahan Baku',
                    'Pegawai': 'Data Karyawan & Absensi',
                    'Rekap Penjualan': 'Analisis Laporan Keuangan'
                };
                subtitleEl.innerText = subtitles[btnText] || 'Sistem Aktif';
            }
        }

        function finalizeNavigation(element, url) {
            const contentArea = document.getElementById('content-area');
            contentArea.classList.remove('fade-out');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            if (element) element.classList.add('nav-active');
            localStorage.setItem('admin_last_page', url);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar && overlay) {
                sidebar.classList.toggle('sidebar-hidden');
                overlay.classList.toggle('hidden');
            }
        }

        function startClock() {
            const clockEl = document.getElementById('real-time-clock');
            const dateEl = document.getElementById('real-time-date');
            
            const update = () => {
                const now = new Date();
                if (clockEl) clockEl.innerText = now.toLocaleTimeString('id-ID', { hour12: false });
                if (dateEl) {
                    const options = { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' };
                    dateEl.innerText = now.toLocaleDateString('id-ID', options);
                }
            };
            update();
            setInterval(update, 1000);
        }

        window.onload = () => {
            startClock();
            
            const lastPage = localStorage.getItem('admin_last_page') || 'dashboard.html';
            const navButtons = Array.from(document.querySelectorAll('.nav-btn'));
            const defaultBtn = navButtons.find(btn => {
                const attr = btn.getAttribute('onclick');
                return attr && attr.includes(lastPage);
            }) || navButtons[0];
            
            if (defaultBtn) {
                const pathMatch = defaultBtn.getAttribute('onclick').match(/'([^']+)'/);
                const path = pathMatch ? pathMatch[1] : 'dashboard.html';
                navigate(path, defaultBtn);
            }
        };
    </script>
</body>
</html>
