<div class="flex flex-col lg:flex-row gap-4 lg:gap-6 lg:h-[calc(100vh-160px)] overflow-hidden">
    <!-- Area Menu (Kiri) -->
    <div class="flex-1 flex flex-col min-w-0 h-full">
        <!-- Search & Filter Area -->
        <div class="mb-4 lg:mb-6 space-y-4">
            <!-- Search Bar -->
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" placeholder="Cari menu..." class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-400 transition bg-white shadow-sm">
            </div>
            
            <!-- Category Chips (Horizontal Scroll on Mobile) -->
            <div class="flex overflow-x-auto pb-2 no-scrollbar gap-2 -mx-1 px-1 lg:mx-0">
                <button class="whitespace-nowrap px-4 py-2 rounded-full bg-slate-900 text-white text-xs font-bold shadow-md shadow-slate-200">Semua</button>
                <button class="whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-100 text-xs font-bold hover:bg-amber-50 transition">Makanan</button>
                <button class="whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-100 text-xs font-bold hover:bg-amber-50 transition">Minuman</button>
                <button class="whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-100 text-xs font-bold hover:bg-amber-50 transition">Camilan</button>
                <button class="whitespace-nowrap px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-100 text-xs font-bold hover:bg-amber-50 transition">Paket Hemat</button>
            </div>
        </div>

        <!-- Grid Menu -->
        <div class="flex-1 overflow-y-auto pr-1 lg:pr-2 -mx-1 px-1 lg:mx-0">
            <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3 lg:gap-4">
                <!-- Product Card 1 -->
                <div onclick="addToCart('Ayam Bakar', 25000)" class="bg-white p-2 lg:p-3 rounded-2xl border border-slate-100 shadow-sm hover:border-amber-400 hover:shadow-md transition-all cursor-pointer group active:scale-95">
                    <div class="aspect-square bg-slate-100 rounded-xl mb-3 flex items-center justify-center text-slate-300 relative overflow-hidden">
                        <i class="fas fa-image text-2xl"></i>
                        <!-- Badge for stock if needed -->
                        <span class="absolute top-2 right-2 bg-emerald-500 text-white text-[8px] px-1.5 py-0.5 rounded font-bold">READY</span>
                    </div>
                    <h5 class="font-bold text-xs lg:text-sm text-slate-800 line-clamp-2 h-10">Ayam Bakar Spesial</h5>
                    <p class="text-amber-600 font-extrabold text-sm mt-1">Rp 25.000</p>
                </div>

                <!-- Product Card 2 -->
                <div onclick="addToCart('Nasi Putih', 5000)" class="bg-white p-2 lg:p-3 rounded-2xl border border-slate-100 shadow-sm hover:border-amber-400 hover:shadow-md transition-all cursor-pointer group active:scale-95">
                    <div class="aspect-square bg-slate-100 rounded-xl mb-3 flex items-center justify-center text-slate-300">
                        <i class="fas fa-image text-2xl"></i>
                    </div>
                    <h5 class="font-bold text-xs lg:text-sm text-slate-800 line-clamp-2 h-10">Nasi Putih</h5>
                    <p class="text-amber-600 font-extrabold text-sm mt-1">Rp 5.000</p>
                </div>

                <!-- Product Card 3 -->
                <div onclick="addToCart('Es Teh Manis', 5000)" class="bg-white p-2 lg:p-3 rounded-2xl border border-slate-100 shadow-sm hover:border-amber-400 hover:shadow-md transition-all cursor-pointer group active:scale-95">
                    <div class="aspect-square bg-slate-100 rounded-xl mb-3 flex items-center justify-center text-slate-300">
                        <i class="fas fa-image text-2xl"></i>
                    </div>
                    <h5 class="font-bold text-xs lg:text-sm text-slate-800 line-clamp-2 h-10">Es Teh Manis</h5>
                    <p class="text-amber-600 font-extrabold text-sm mt-1">Rp 5.000</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Area Keranjang (Kanan) -->
    <!-- On mobile: appears below, on desktop: fixed side -->
    <div class="w-full lg:w-96 bg-white rounded-t-3xl lg:rounded-2xl shadow-2xl lg:shadow-lg border border-slate-200 flex flex-col overflow-hidden lg:h-full relative z-10">
        <!-- Header Cart -->
        <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div class="flex items-center">
                <i class="fas fa-shopping-basket text-amber-500 mr-2"></i>
                <h4 class="font-bold text-slate-800">Pesanan</h4>
            </div>
            <button onclick="clearCart()" class="text-rose-500 text-[10px] font-bold uppercase tracking-wider hover:bg-rose-50 px-2 py-1 rounded">Hapus Semua</button>
        </div>

        <!-- List Item (Scrollable) -->
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4 max-h-[300px] lg:max-h-none">
            <!-- Empty State -->
            <div id="cart-empty" class="h-40 flex flex-col items-center justify-center text-slate-400">
                <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center mb-3">
                    <i class="fas fa-shopping-cart text-xl opacity-20"></i>
                </div>
                <p class="text-[10px] font-bold uppercase tracking-widest">Keranjang Kosong</p>
            </div>
        </div>

        <!-- Ringkasan Bayar -->
        <div class="p-4 lg:p-6 bg-slate-900 text-white rounded-t-2xl lg:rounded-none space-y-3 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between text-xs text-slate-400">
                <span>Subtotal</span>
                <span id="subtotal" class="font-bold">Rp 0</span>
            </div>
            <div class="flex justify-between text-lg lg:text-xl border-t border-slate-800 pt-3">
                <span class="font-bold">TOTAL</span>
                <span id="total-price" class="font-extrabold text-amber-400">Rp 0</span>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="processPayment()" class="bg-amber-500 text-slate-900 py-3 rounded-xl font-bold text-xs hover:bg-amber-400 transition-all flex items-center justify-center shadow-lg shadow-amber-900/20">
                    <i class="fas fa-check-circle mr-2"></i> BAYAR
                </button>
                <button onclick="alert('Fitur Cetak segera hadir!')" class="bg-slate-800 text-white py-3 rounded-xl font-bold text-xs hover:bg-slate-700 transition-all flex items-center justify-center border border-slate-700">
                    <i class="fas fa-print mr-2"></i> STRUK
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }
</style>

<script>
    // Inisialisasi Cart dari LocalStorage jika ada
    let cart = JSON.parse(localStorage.getItem('current_cart')) || [];
    
    // Pastikan UI terupdate saat halaman dimuat
    setTimeout(renderCart, 100);

    function addToCart(name, price) {
        const existing = cart.find(item => item.name === name);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ name, price, qty: 1 });
        }
        saveAndRender();
        
        // Haptic Feedback sederhana (visual)
        const cartIcon = document.querySelector('.fa-shopping-basket');
        cartIcon.classList.add('animate-bounce');
        setTimeout(() => cartIcon.classList.remove('animate-bounce'), 500);
    }

    function saveAndRender() {
        localStorage.setItem('current_cart', JSON.stringify(cart));
        renderCart();
    }

    function clearCart() {
        if(cart.length === 0) return;
        if(confirm('Hapus semua pesanan?')) {
            cart = [];
            saveAndRender();
        }
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        
        if (cart.length === 0) {
            container.innerHTML = `
                <div id="cart-empty" class="h-40 flex flex-col items-center justify-center text-slate-400">
                    <div class="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center mb-3">
                        <i class="fas fa-shopping-cart text-xl opacity-20"></i>
                    </div>
                    <p class="text-[10px] font-bold uppercase tracking-widest">Keranjang Kosong</p>
                </div>
            `;
            updateTotals();
            return;
        }

        container.innerHTML = cart.map((item, index) => `
            <div class="flex items-center justify-between group animate-fadeIn">
                <div class="flex-1 pr-4">
                    <h6 class="text-xs font-bold text-slate-800">${item.name}</h6>
                    <div class="flex items-center mt-1 space-x-2">
                         <button onclick="updateQty(${index}, -1)" class="w-5 h-5 rounded bg-slate-100 flex items-center justify-center text-[10px]">-</button>
                         <span class="text-xs font-bold text-slate-600">${item.qty}</span>
                         <button onclick="updateQty(${index}, 1)" class="w-5 h-5 rounded bg-slate-100 flex items-center justify-center text-[10px]">+</button>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs font-bold text-slate-800">Rp ${(item.price * item.qty).toLocaleString()}</p>
                    <button onclick="removeFromCart(${index})" class="text-[10px] text-rose-400 hover:text-rose-600">Hapus</button>
                </div>
            </div>
        `).join('');
        
        updateTotals();
    }

    function updateQty(index, delta) {
        cart[index].qty += delta;
        if(cart[index].qty <= 0) {
            cart.splice(index, 1);
        }
        saveAndRender();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        saveAndRender();
    }

    function updateTotals() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        document.getElementById('subtotal').innerText = `Rp ${total.toLocaleString()}`;
        document.getElementById('total-price').innerText = `Rp ${total.toLocaleString()}`;
    }

    function processPayment() {
        if (cart.length === 0) return alert("Pilih menu dulu!");
        
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        // Simpan ke history pending
        const transaction = {
            id: 'TRX-' + Date.now(),
            items: [...cart],
            total: total,
            time: new Date().toLocaleTimeString(),
            date: new Date().toLocaleDateString()
        };
        
        const history = JSON.parse(localStorage.getItem('pending_transactions') || '[]');
        history.push(transaction);
        localStorage.setItem('pending_transactions', JSON.stringify(history));
        
        alert("Pembayaran Berhasil (Offline)!\nTotal: Rp " + total.toLocaleString());
        cart = [];
        saveAndRender();
    }
</script>
