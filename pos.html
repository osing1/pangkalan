<div class="flex flex-col lg:flex-row gap-4 lg:gap-6 lg:h-[calc(100vh-160px)] overflow-hidden animate-fadeIn">
    <!-- Area Menu (Kiri) -->
    <div class="flex-1 flex flex-col min-w-0 h-full">
        <!-- Search & Filter Area -->
        <div class="mb-4 lg:mb-6 space-y-4">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="pos-search" oninput="renderPosMenu()" placeholder="Cari menu untuk pelanggan..." class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-400 transition bg-white shadow-sm font-medium">
            </div>
            
            <div class="flex overflow-x-auto pb-2 no-scrollbar gap-2">
                <button onclick="setPosCategory('Semua')" class="pos-cat-btn whitespace-nowrap px-5 py-2 rounded-xl bg-slate-900 text-white text-[10px] font-black shadow-lg" data-category="Semua">SEMUA</button>
                <button onclick="setPosCategory('Makanan')" class="pos-cat-btn whitespace-nowrap px-5 py-2 rounded-xl bg-white text-slate-400 border border-slate-100 text-[10px] font-black hover:bg-slate-50" data-category="Makanan">MAKANAN</button>
                <button onclick="setPosCategory('Minuman')" class="pos-cat-btn whitespace-nowrap px-5 py-2 rounded-xl bg-white text-slate-400 border border-slate-100 text-[10px] font-black hover:bg-slate-50" data-category="Minuman">MINUMAN</button>
                <button onclick="setPosCategory('Paket')" class="pos-cat-btn whitespace-nowrap px-5 py-2 rounded-xl bg-white text-slate-400 border border-slate-100 text-[10px] font-black hover:bg-slate-50" data-category="Paket">PAKET</button>
            </div>
        </div>

        <!-- Grid Menu -->
        <div id="pos-menu-grid" class="flex-1 overflow-y-auto pr-2 grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4 no-scrollbar">
            <!-- Loading State -->
            <div class="animate-pulse bg-white p-3 rounded-2xl border border-slate-100 h-40"></div>
            <div class="animate-pulse bg-white p-3 rounded-2xl border border-slate-100 h-40"></div>
            <div class="animate-pulse bg-white p-3 rounded-2xl border border-slate-100 h-40"></div>
        </div>
    </div>

    <!-- Area Keranjang (Kanan) -->
    <div class="w-full lg:w-96 bg-white rounded-t-[40px] lg:rounded-[32px] shadow-2xl border border-slate-100 flex flex-col overflow-hidden h-[500px] lg:h-full relative z-10">
        <div class="p-6 border-b border-slate-50 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center text-amber-600">
                    <i class="fas fa-shopping-basket text-sm"></i>
                </div>
                <h4 class="font-black text-slate-800 uppercase tracking-tight text-sm">Item Pesanan</h4>
            </div>
            <button onclick="clearPosCart()" class="text-rose-400 text-[9px] font-black uppercase tracking-widest hover:text-rose-600">Reset</button>
        </div>

        <!-- List Item -->
        <div id="pos-cart-items" class="flex-1 overflow-y-auto p-6 space-y-5 no-scrollbar">
            <div class="flex flex-col items-center justify-center h-full text-slate-300 opacity-50">
                <i class="fas fa-box-open text-3xl mb-2"></i>
                <p class="text-[10px] font-black uppercase tracking-widest">Belum ada item</p>
            </div>
        </div>

        <!-- Ringkasan Bayar -->
        <div class="p-6 bg-slate-900 text-white space-y-4 shadow-2xl">
            <!-- Tipe Pesanan -->
            <div class="flex gap-2 p-1 bg-white/10 rounded-xl">
                <button onclick="setPosOrderType('Dine In')" id="pos-type-dinein" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest bg-white text-slate-900">Makan Sini</button>
                <button onclick="setPosOrderType('Take Away')" id="pos-type-takeaway" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest text-white/50">Bungkus</button>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between text-[10px] font-bold text-white/40 uppercase tracking-widest">
                    <span>Subtotal</span>
                    <span id="pos-subtotal">Rp 0</span>
                </div>
                <div class="flex justify-between items-center pt-2 border-t border-white/5">
                    <span class="text-xs font-black uppercase tracking-widest text-amber-400">Total Akhir</span>
                    <span id="pos-total" class="text-xl font-black tabular-nums tracking-tighter">Rp 0</span>
                </div>
            </div>
            
            <button onclick="processPosPayment()" id="pos-btn-pay" class="w-full bg-amber-400 text-slate-900 py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-amber-900/20 active:scale-95 transition-all">
                PROSES TRANSAKSI
            </button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwmI9kBYFGuOPH9cnwMK9wuGuYSZcto_EyIW0N2zDTasuW8gkZ8k7PCeVS_PYyzvRgfNg/exec";
    let posMenuItems = [];
    let posCart = [];
    let posCurrentCategory = "Semua";
    let posOrderType = "Dine In";

    async function loadPosData() {
        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getMenu' }) });
            const result = await res.json();
            if(result.status === 'success') {
                posMenuItems = result.data;
                renderPosMenu();
            }
        } catch (e) {
            console.error("Gagal memuat menu Kasir");
        }
    }

    function renderPosMenu() {
        const grid = document.getElementById('pos-menu-grid');
        const search = document.getElementById('pos-search').value.toLowerCase();
        
        const filtered = posMenuItems.filter(i => {
            const matchCat = posCurrentCategory === "Semua" || i.kategori === posCurrentCategory;
            const name = (i.nama || i.name || "").toLowerCase();
            return matchCat && name.includes(search);
        });

        grid.innerHTML = filtered.map(item => `
            <div onclick="addPosToCart(${item.id})" class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm hover:border-amber-400 hover:shadow-md transition-all cursor-pointer group active:scale-95">
                <div class="aspect-square bg-slate-50 rounded-xl mb-3 overflow-hidden relative">
                    <img src="${item.img || ''}" class="w-full h-full object-cover" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgMjQgMjQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2NiZDVlMSIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiPjxyZWN0IHdpZHRoPSIxOCIgaGVpZ2h0PSIxOCIgeD0iMyIgeT0iMyIgcng9IjIiIHJ5PSIyIj48L3JlY3Q+PGNpcmNsZSBjeD0iOSIgY3k9IjkiIHI9IjIiPjwvY2lyY2xlPjxwYXRoIGQ9Im0yMSAxNS0zLjA4Ni0zLjA4NmEyIDIgMCAwIDAtMi44MjggMEw2IDIxIj48L3BhdGg+PC9zdmc+';">
                    ${item.stock != 'TRUE' && item.stock !== true ? '<div class="absolute inset-0 bg-white/80 flex items-center justify-center font-black text-[10px] text-rose-500 uppercase">Habis</div>' : ''}
                </div>
                <h5 class="font-black text-[11px] text-slate-800 uppercase tracking-tight line-clamp-2 h-8">${item.nama || item.name}</h5>
                <p class="text-amber-600 font-black text-xs mt-1 tracking-tighter">Rp ${parseInt(item.harga).toLocaleString()}</p>
            </div>
        `).join('');
    }

    function addPosToCart(id) {
        const item = posMenuItems.find(i => i.id == id);
        if(!item || item.stock == 'FALSE') return;

        const inCart = posCart.find(i => i.id == id);
        if(inCart) inCart.qty++; else posCart.push({ ...item, qty: 1 });
        renderPosCart();
    }

    function renderPosCart() {
        const container = document.getElementById('pos-cart-items');
        if(posCart.length === 0) {
            container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-300 opacity-50"><i class="fas fa-box-open text-3xl mb-2"></i><p class="text-[10px] font-black uppercase tracking-widest">Belum ada item</p></div>`;
            updatePosTotals();
            return;
        }

        container.innerHTML = posCart.map((item, index) => `
            <div class="flex items-center justify-between group">
                <div class="flex-1 pr-4">
                    <h6 class="text-[11px] font-black text-slate-800 uppercase tracking-tight">${item.nama || item.name}</h6>
                    <div class="flex items-center mt-2 space-x-3">
                         <button onclick="updatePosQty(${index}, -1)" class="w-6 h-6 rounded-lg bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-slate-100 transition-colors">-</button>
                         <span class="text-xs font-black text-slate-600 w-4 text-center tabular-nums">${item.qty}</span>
                         <button onclick="updatePosQty(${index}, 1)" class="w-6 h-6 rounded-lg bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-slate-100 transition-colors">+</button>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[11px] font-black text-slate-800 tracking-tighter">Rp ${(item.harga * item.qty).toLocaleString()}</p>
                    <button onclick="removeFromPosCart(${index})" class="text-[9px] font-bold text-rose-300 hover:text-rose-500 uppercase mt-1">Hapus</button>
                </div>
            </div>
        `).join('');
        updatePosTotals();
    }

    function updatePosQty(i, d) {
        posCart[i].qty += d;
        if(posCart[i].qty <= 0) posCart.splice(i, 1);
        renderPosCart();
    }

    function removeFromPosCart(i) { posCart.splice(i, 1); renderPosCart(); }
    function clearPosCart() { posCart = []; renderPosCart(); }

    function updatePosTotals() {
        const total = posCart.reduce((s, i) => s + (i.harga * i.qty), 0);
        document.getElementById('pos-subtotal').innerText = `Rp ${total.toLocaleString()}`;
        document.getElementById('pos-total').innerText = `Rp ${total.toLocaleString()}`;
    }

    function setPosOrderType(type) {
        posOrderType = type;
        const btnDine = document.getElementById('pos-type-dinein');
        const btnTake = document.getElementById('pos-type-takeaway');
        if(type === 'Dine In') {
            btnDine.className = "flex-1 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest bg-white text-slate-900";
            btnTake.className = "flex-1 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest text-white/50";
        } else {
            btnTake.className = "flex-1 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest bg-white text-slate-900";
            btnDine.className = "flex-1 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest text-white/50";
        }
    }

    function setPosCategory(cat) {
        posCurrentCategory = cat;
        document.querySelectorAll('.pos-cat-btn').forEach(btn => {
            if(btn.dataset.category === cat) {
                btn.className = "pos-cat-btn whitespace-nowrap px-5 py-2 rounded-xl bg-slate-900 text-white text-[10px] font-black shadow-lg";
            } else {
                btn.className = "pos-cat-btn whitespace-nowrap px-5 py-2 rounded-xl bg-white text-slate-400 border border-slate-100 text-[10px] font-black hover:bg-slate-50";
            }
        });
        renderPosMenu();
    }

    async function processPosPayment() {
        if (posCart.length === 0) return alert("Pilih menu dulu!");
        const btn = document.getElementById('pos-btn-pay');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "MENGIRIM...";

        const order = {
            id: 'ORD' + Math.floor(Math.random() * 9000 + 1000),
            table: "KASIR", // Input manual bisa ditambahkan jika perlu
            type: posOrderType,
            items: posCart,
            total: posCart.reduce((s, i) => s + (i.harga * i.qty), 0)
        };

        try {
            const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'submitOrder', data: order }) });
            const result = await response.json();
            if(result.status === 'success') {
                alert("Transaksi Berhasil!");
                clearPosCart();
            }
        } catch (err) {
            alert("Koneksi Bermasalah. Gagal menyimpan ke cloud.");
        } finally {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    loadPosData();
</script>
