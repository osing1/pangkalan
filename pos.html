<div class="flex flex-col lg:flex-row gap-6 h-[calc(100vh-180px)]">
    <!-- Area Menu (Kiri) -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Search & Filter -->
        <div class="flex gap-4 mb-6">
            <div class="flex-1 relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" placeholder="Cari menu atau scan barcode..." class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-400 transition">
            </div>
            <select class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none">
                <option>Semua Kategori</option>
                <option>Makanan</option>
                <option>Minuman</option>
                <option>Camilan</option>
            </select>
        </div>

        <!-- Grid Menu -->
        <div class="flex-1 overflow-y-auto pr-2">
            <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4">
                <!-- Mock Products -->
                <div onclick="addToCart('Ayam Bakar', 25000)" class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm hover:border-amber-400 hover:shadow-md transition-all cursor-pointer group">
                    <div class="aspect-square bg-slate-100 rounded-xl mb-3 flex items-center justify-center text-slate-300">
                        <i class="fas fa-image text-3xl"></i>
                    </div>
                    <h5 class="font-bold text-sm text-slate-800 line-clamp-1">Ayam Bakar Spesial</h5>
                    <p class="text-amber-600 font-bold text-sm mt-1">Rp 25.000</p>
                </div>
                <div onclick="addToCart('Nasi Putih', 5000)" class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm hover:border-amber-400 hover:shadow-md transition-all cursor-pointer group">
                    <div class="aspect-square bg-slate-100 rounded-xl mb-3 flex items-center justify-center text-slate-300">
                        <i class="fas fa-image text-3xl"></i>
                    </div>
                    <h5 class="font-bold text-sm text-slate-800 line-clamp-1">Nasi Putih</h5>
                    <p class="text-amber-600 font-bold text-sm mt-1">Rp 5.000</p>
                </div>
                <div onclick="addToCart('Es Teh Manis', 5000)" class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm hover:border-amber-400 hover:shadow-md transition-all cursor-pointer group">
                    <div class="aspect-square bg-slate-100 rounded-xl mb-3 flex items-center justify-center text-slate-300">
                        <i class="fas fa-image text-3xl"></i>
                    </div>
                    <h5 class="font-bold text-sm text-slate-800 line-clamp-1">Es Teh Manis</h5>
                    <p class="text-amber-600 font-bold text-sm mt-1">Rp 5.000</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Area Keranjang (Kanan) -->
    <div class="w-full lg:w-96 bg-white rounded-2xl shadow-lg border border-slate-200 flex flex-col overflow-hidden">
        <div class="p-4 border-b border-slate-100 flex items-center justify-between">
            <h4 class="font-bold text-slate-800">Pesanan Baru</h4>
            <button onclick="clearCart()" class="text-rose-500 text-xs font-bold hover:underline">Hapus Semua</button>
        </div>

        <!-- List Item -->
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Empty State -->
            <div id="cart-empty" class="h-full flex flex-col items-center justify-center text-slate-400">
                <i class="fas fa-shopping-cart text-4xl mb-2 opacity-20"></i>
                <p class="text-xs font-medium">Keranjang Kosong</p>
            </div>
        </div>

        <!-- Ringkasan Bayar -->
        <div class="p-6 bg-slate-50 border-t border-slate-200 space-y-3">
            <div class="flex justify-between text-sm">
                <span class="text-slate-500">Subtotal</span>
                <span id="subtotal" class="font-bold text-slate-700">Rp 0</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-slate-500">Pajak (0%)</span>
                <span class="font-bold text-slate-700">Rp 0</span>
            </div>
            <div class="flex justify-between text-xl border-t border-slate-200 pt-3">
                <span class="font-extrabold text-slate-800">TOTAL</span>
                <span id="total-price" class="font-extrabold text-amber-600">Rp 0</span>
            </div>
            <button onclick="processPayment()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold mt-4 shadow-lg shadow-slate-200 hover:bg-slate-800 transition-all flex items-center justify-center">
                <i class="fas fa-print mr-2"></i> BAYAR & CETAK
            </button>
        </div>
    </div>
</div>

<script>
    // Logika Keranjang Sederhana
    let cart = [];

    function addToCart(name, price) {
        const existing = cart.find(item => item.name === name);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ name, price, qty: 1 });
        }
        renderCart();
    }

    function clearCart() {
        cart = [];
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const emptyState = document.getElementById('cart-empty');
        
        if (cart.length === 0) {
            container.innerHTML = '';
            container.appendChild(emptyState);
            updateTotals();
            return;
        }

        emptyState.remove();
        container.innerHTML = cart.map((item, index) => `
            <div class="flex items-center justify-between group">
                <div class="flex-1">
                    <h6 class="text-sm font-bold text-slate-800">${item.name}</h6>
                    <p class="text-xs text-slate-400">${item.qty} x Rp ${item.price.toLocaleString()}</p>
                </div>
                <div class="flex items-center space-x-3">
                    <span class="text-sm font-bold text-slate-800">Rp ${(item.price * item.qty).toLocaleString()}</span>
                    <button onclick="removeFromCart(${index})" class="text-slate-300 hover:text-rose-500 transition">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            </div>
        `).join('');
        
        updateTotals();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function updateTotals() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        document.getElementById('subtotal').innerText = `Rp ${total.toLocaleString()}`;
        document.getElementById('total-price').innerText = `Rp ${total.toLocaleString()}`;
    }

    function processPayment() {
        if (cart.length === 0) return alert("Keranjang masih kosong!");
        
        // Simpan data offline ke localStorage
        const transaction = {
            id: 'TRX-' + Date.now(),
            items: cart,
            total: cart.reduce((sum, item) => sum + (item.price * item.qty), 0),
            date: new Date().toISOString()
        };
        
        const history = JSON.parse(localStorage.getItem('pending_transactions') || '[]');
        history.push(transaction);
        localStorage.setItem('pending_transactions', JSON.stringify(history));
        
        alert("Transaksi Berhasil Simpan Offline!\nSilakan Cetak Struk.");
        clearCart();
    }
</script>
