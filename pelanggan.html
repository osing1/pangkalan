<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu RM PANGKALAN - Digital Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .status-dot::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            margin-left: 6px;
            animation: blink 1.2s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-32">

    <!-- Header Section -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-slate-100 shadow-sm px-4 py-4">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-400 rounded-2xl flex items-center justify-center shadow-lg shadow-amber-200">
                    <i class="fas fa-utensils text-slate-900"></i>
                </div>
                <div>
                    <h1 class="text-base font-black text-slate-800 leading-none tracking-tight">RM PANGKALAN</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="table-display" class="text-[9px] font-black bg-slate-900 text-white px-1.5 py-0.5 rounded tracking-widest uppercase">Meja 05</span>
                        <span class="text-[9px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded">BUKA</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleSearch()" class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500">
                    <i class="fas fa-search"></i>
                </button>
                <button onclick="openHistoryModal()" class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 relative">
                    <i class="fas fa-list-check"></i>
                    <span id="history-count" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-amber-500 text-slate-900 text-[8px] font-black rounded-full flex items-center justify-center border-2 border-white">0</span>
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div id="search-container" class="hidden mt-4 animate-slideDown max-w-2xl mx-auto">
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="menu-search" oninput="filterMenu()" placeholder="Cari menu..." class="w-full pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-amber-400 text-sm font-medium">
            </div>
        </div>

        <!-- Categories -->
        <div class="flex overflow-x-auto no-scrollbar gap-2 mt-4 max-w-2xl mx-auto">
            <button onclick="setCategory('Semua')" class="cat-btn whitespace-nowrap bg-slate-900 text-white px-5 py-2 rounded-xl text-[11px] font-black transition-all shadow-md" data-category="Semua">SEMUA</button>
            <button onclick="setCategory('Makanan')" class="cat-btn whitespace-nowrap bg-white text-slate-500 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-black transition-all" data-category="Makanan">MAKANAN</button>
            <button onclick="setCategory('Minuman')" class="cat-btn whitespace-nowrap bg-white text-slate-500 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-black transition-all" data-category="Minuman">MINUMAN</button>
            <button onclick="setCategory('Paket')" class="cat-btn whitespace-nowrap bg-white text-slate-500 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-black transition-all" data-category="Paket">PAKET</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto mt-6 px-4">
        <!-- Promo Section -->
        <div class="mb-8 group">
            <div class="relative rounded-[32px] overflow-hidden bg-slate-900 aspect-[16/9] shadow-2xl shadow-slate-200">
                <img src="https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-700" alt="Promo">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent p-6 flex flex-col justify-end">
                    <span class="w-fit bg-amber-400 text-slate-900 text-[8px] font-black px-2 py-0.5 rounded-full mb-2">HOT DEALS</span>
                    <h2 class="text-2xl font-black text-white leading-tight uppercase tracking-tight">Ayam Bakar<br>Madu Hutan</h2>
                    <p class="text-white/60 text-[10px] mt-2 font-medium">Bumbu meresap sempurna, dibakar dengan madu asli.</p>
                    <div class="flex items-center gap-3 mt-4">
                        <span class="text-amber-400 font-black text-lg">Rp 25.000</span>
                        <button onclick="addToCart(1)" class="bg-white text-slate-900 px-4 py-2 rounded-xl text-[10px] font-black shadow-lg">PESAN SEKARANG</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Menu List -->
        <div id="menu-container" class="grid grid-cols-1 gap-4 pb-20">
            <!-- Items injected by JS -->
        </div>
    </main>

    <!-- Sidebar Actions -->
    <div class="fixed bottom-32 right-6 z-40 flex flex-col gap-3">
        <button onclick="callWaiter()" title="Panggil Pelayan" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-2xl shadow-indigo-200 flex items-center justify-center hover:scale-110 active:scale-90 transition-all group">
            <i class="fas fa-concierge-bell text-xl"></i>
            <span class="absolute right-16 bg-slate-900 text-white text-[10px] font-bold px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Panggil Pelayan</span>
        </button>
        <button onclick="requestBill()" title="Minta Bill" class="w-14 h-14 bg-white text-slate-800 border border-slate-100 rounded-2xl shadow-2xl flex items-center justify-center hover:scale-110 active:scale-90 transition-all group">
            <i class="fas fa-receipt text-xl"></i>
            <span class="absolute right-16 bg-slate-900 text-white text-[10px] font-bold px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Minta Bill</span>
        </button>
    </div>

    <!-- Bottom Checkout Bar -->
    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 z-50 transform translate-y-32 transition-all duration-500 ease-in-out max-w-2xl mx-auto">
        <div class="bg-slate-900/95 backdrop-blur-xl rounded-3xl p-4 shadow-2xl border border-white/10 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-400 rounded-2xl flex items-center justify-center text-slate-900 shadow-inner relative">
                    <i class="fas fa-shopping-basket text-xl"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-black w-6 h-6 rounded-full border-2 border-slate-900 flex items-center justify-center">0</span>
                </div>
                <div>
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Sementara</p>
                    <p id="cart-total-display" class="text-xl font-black text-white tracking-tighter">Rp 0</p>
                </div>
            </div>
            <button onclick="openCartModal()" class="bg-white text-slate-900 px-6 py-4 rounded-2xl font-black text-xs shadow-xl active:scale-95 transition-all">
                KONFIRMASI
            </button>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cart-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onclick="closeCartModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[48px] p-8 max-h-[90vh] flex flex-col shadow-2xl animate-slideUp max-w-2xl mx-auto">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            
            <h3 class="text-2xl font-black text-slate-800 tracking-tight mb-2">Keranjang Pesanan</h3>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-8">Meja 05 &bull; <span id="modal-type-display">Dine In</span></p>

            <div id="modal-items-list" class="flex-1 overflow-y-auto space-y-6 pr-2 no-scrollbar">
                <!-- Items list -->
            </div>

            <!-- Options -->
            <div class="mt-8 grid grid-cols-2 gap-4">
                <button onclick="setOrderType('Dine In')" id="type-dinein" class="flex flex-col items-center gap-2 p-4 rounded-3xl border-2 border-slate-900 bg-slate-900 text-white transition-all">
                    <i class="fas fa-chair text-lg"></i>
                    <span class="text-[10px] font-black uppercase">Makan Sini</span>
                </button>
                <button onclick="setOrderType('Take Away')" id="type-takeaway" class="flex flex-col items-center gap-2 p-4 rounded-3xl border-2 border-slate-100 bg-white text-slate-400 transition-all">
                    <i class="fas fa-shopping-bag text-lg"></i>
                    <span class="text-[10px] font-black uppercase">Bungkus</span>
                </button>
            </div>

            <div class="mt-8 space-y-4 pt-6 border-t border-slate-50">
                <div class="flex justify-between items-center text-sm font-bold text-slate-500">
                    <span>Subtotal Tagihan</span>
                    <span id="modal-total" class="text-slate-900 font-black text-xl">Rp 0</span>
                </div>
                <button onclick="confirmOrder()" class="w-full bg-slate-900 text-white py-5 rounded-[28px] font-black text-sm shadow-2xl active:scale-[0.98] transition-all">
                    KIRIM KE DAPUR SEKARANG
                </button>
            </div>
        </div>
    </div>

    <!-- Status History Modal -->
    <div id="history-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onclick="closeHistoryModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-slate-50 rounded-t-[48px] p-8 max-h-[85vh] flex flex-col max-w-2xl mx-auto">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-black text-slate-800">Lacak Pesanan</h3>
                <span class="text-[10px] font-black text-slate-400 tracking-widest uppercase">Estimasi: 15 Menit</span>
            </div>
            
            <div id="history-list" class="flex-1 overflow-y-auto space-y-4 no-scrollbar">
                <!-- History -->
            </div>
            
            <div class="mt-8 p-6 bg-white rounded-3xl border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Metode Pembayaran</p>
                    <p class="text-xs font-black text-slate-800 mt-1">Cash di Kasir / QRIS</p>
                </div>
                <i class="fas fa-qrcode text-2xl text-slate-300"></i>
            </div>
            <button onclick="closeHistoryModal()" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-black text-xs mt-6 border border-slate-200">TUTUP</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] transform -translate-y-32 transition-all duration-500 w-[90%] max-w-sm">
        <div class="bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-4">
            <div id="toast-icon" class="w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center text-slate-900"><i class="fas fa-check"></i></div>
            <p id="toast-msg" class="text-xs font-bold font-medium"></p>
        </div>
    </div>

    <script>
        const menuItems = [
            { id: 1, name: "Ayam Bakar Madu", price: 25000, category: "Makanan", desc: "Ayam bumbu madu asli, dibakar matang sempurna.", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=200", tag: "Best Seller", stock: true },
            { id: 2, name: "Nasi Goreng Pangkalan", price: 20000, category: "Makanan", desc: "Nasi goreng spesial telur + kerupuk.", img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=200", tag: "Pedas", stock: true },
            { id: 3, name: "Es Teh Manis", price: 5000, category: "Minuman", desc: "Teh segar daun asli, gula murni.", img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=200", tag: null, stock: true },
            { id: 4, name: "Es Jeruk Peras", price: 8000, category: "Minuman", desc: "Jeruk murni perasan tangan.", img: "https://images.unsplash.com/photo-1621506289937-48a4df457635?w=200", tag: "Segar", stock: true },
            { id: 5, name: "Sop Iga Sapi", price: 45000, category: "Makanan", desc: "Iga sapi pilihan dengan kuah bening gurih.", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=200", tag: "Terbatas", stock: false },
            { id: 6, name: "Tempe Mendoan", price: 10000, category: "Camilan", desc: "Tempe lebar gurih isi 3 pcs.", img: "https://images.unsplash.com/photo-1610192244261-3f33de3f55e4?w=200", tag: "Favorite", stock: true }
        ];

        let cart = [];
        let currentCategory = "Semua";
        let orderType = "Dine In";

        window.onload = () => {
            renderMenu();
            loadCart();
            updateHistoryUI();
        };

        function showToast(msg, icon = 'fa-check') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerHTML = `<i class="fas ${icon}"></i>`;
            toast.classList.remove('-translate-y-32');
            setTimeout(() => toast.classList.add('-translate-y-32'), 3000);
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if (btn.dataset.category === cat) {
                    btn.className = "cat-btn whitespace-nowrap bg-slate-900 text-white px-5 py-2 rounded-xl text-[11px] font-black shadow-md";
                } else {
                    btn.className = "cat-btn whitespace-nowrap bg-white text-slate-500 border border-slate-100 px-5 py-2 rounded-xl text-[11px] font-black transition-all";
                }
            });
            renderMenu();
        }

        function renderMenu(filter = "") {
            const container = document.getElementById('menu-container');
            container.innerHTML = "";

            const filtered = menuItems.filter(item => {
                const matchCat = currentCategory === "Semua" || item.category === currentCategory;
                const matchSearch = item.name.toLowerCase().includes(filter.toLowerCase());
                return matchCat && matchSearch;
            });

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = `bg-white p-3 rounded-[24px] border border-slate-100 flex items-center gap-4 transition-all shadow-sm ${!item.stock ? 'opacity-60 grayscale' : 'active:scale-[0.98]'}`;
                div.innerHTML = `
                    <div class="w-24 h-24 bg-slate-100 rounded-2xl flex-shrink-0 overflow-hidden relative">
                        <img src="${item.img}" class="w-full h-full object-cover" alt="${item.name}">
                        ${item.tag ? `<span class="absolute top-1 left-1 bg-amber-400 text-slate-900 text-[7px] font-black px-1.5 py-0.5 rounded-full uppercase">${item.tag}</span>` : ''}
                        ${!item.stock ? `<div class="absolute inset-0 bg-slate-900/60 flex items-center justify-center"><span class="text-white text-[8px] font-black uppercase tracking-widest">HABIS</span></div>` : ''}
                    </div>
                    <div class="flex-1">
                        <h4 class="text-sm font-black text-slate-800 leading-tight uppercase tracking-tight">${item.name}</h4>
                        <p class="text-[9px] text-slate-400 mt-1 line-clamp-1 font-medium">${item.desc}</p>
                        <div class="flex items-center justify-between mt-3">
                            <span class="text-sm font-black text-slate-900">Rp ${item.price.toLocaleString()}</span>
                            <button onclick="${item.stock ? `addToCart(${item.id})` : ''}" class="w-9 h-9 ${item.stock ? 'bg-amber-400 text-slate-900' : 'bg-slate-100 text-slate-300'} rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                                <i class="fas fa-plus text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function toggleSearch() {
            const el = document.getElementById('search-container');
            el.classList.toggle('hidden');
            if(!el.classList.contains('hidden')) document.getElementById('menu-search').focus();
        }

        function filterMenu() {
            renderMenu(document.getElementById('menu-search').value);
        }

        function addToCart(id) {
            const item = menuItems.find(i => i.id === id);
            const inCart = cart.find(i => i.id === id);
            if (inCart) inCart.qty++; else cart.push({ ...item, qty: 1, note: "" });
            updateCartUI();
            saveCart();
            showToast(`${item.name} ditambah`);
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            const qty = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.qty * b.price), 0);
            if (qty > 0) bar.classList.remove('translate-y-32'); else bar.classList.add('translate-y-32');
            document.getElementById('cart-badge').innerText = qty;
            document.getElementById('cart-total-display').innerText = `Rp ${total.toLocaleString()}`;
        }

        function setOrderType(type) {
            orderType = type;
            const btnDine = document.getElementById('type-dinein');
            const btnTake = document.getElementById('type-takeaway');
            if(type === 'Dine In') {
                btnDine.className = "flex flex-col items-center gap-2 p-4 rounded-3xl border-2 border-slate-900 bg-slate-900 text-white transition-all";
                btnTake.className = "flex flex-col items-center gap-2 p-4 rounded-3xl border-2 border-slate-100 bg-white text-slate-400 transition-all";
            } else {
                btnTake.className = "flex flex-col items-center gap-2 p-4 rounded-3xl border-2 border-slate-900 bg-slate-900 text-white transition-all";
                btnDine.className = "flex flex-col items-center gap-2 p-4 rounded-3xl border-2 border-slate-100 bg-white text-slate-400 transition-all";
            }
        }

        function openCartModal() {
            const list = document.getElementById('modal-items-list');
            list.innerHTML = "";
            cart.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between";
                div.innerHTML = `
                    <div class="flex-1 pr-4">
                        <h5 class="text-xs font-black text-slate-800 uppercase tracking-tight">${item.name}</h5>
                        <p class="text-[9px] font-bold text-amber-600 mt-1">Rp ${item.price.toLocaleString()}</p>
                        <input type="text" onchange="updateNote(${index}, this.value)" value="${item.note || ''}" placeholder="Catatan: Tidak pedas..." class="mt-2 w-full bg-slate-50 border-none rounded-lg py-1.5 px-3 text-[9px] font-medium placeholder:text-slate-300 focus:ring-1 focus:ring-amber-400">
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty(${index}, -1)" class="w-8 h-8 bg-slate-50 rounded-lg flex items-center justify-center text-slate-400"><i class="fas fa-minus text-[8px]"></i></button>
                        <span class="text-sm font-black text-slate-800 w-4 text-center">${item.qty}</span>
                        <button onclick="changeQty(${index}, 1)" class="w-8 h-8 bg-slate-50 rounded-lg flex items-center justify-center text-slate-400"><i class="fas fa-plus text-[8px]"></i></button>
                    </div>
                `;
                list.appendChild(div);
            });
            const total = cart.reduce((a, b) => a + (b.qty * b.price), 0);
            document.getElementById('modal-total').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function changeQty(i, d) {
            cart[i].qty += d;
            if (cart[i].qty <= 0) cart.splice(i, 1);
            if (cart.length === 0) closeCartModal(); else openCartModal();
            updateCartUI();
            saveCart();
        }

        function updateNote(i, v) { cart[i].note = v; saveCart(); }
        function saveCart() { localStorage.setItem('customer_cart', JSON.stringify(cart)); }
        function loadCart() { const s = localStorage.getItem('customer_cart'); if(s) { cart = JSON.parse(s); updateCartUI(); } }
        function closeCartModal() { document.getElementById('cart-modal').classList.add('hidden'); }
        function openHistoryModal() { document.getElementById('history-modal').classList.remove('hidden'); updateHistoryUI(); }
        function closeHistoryModal() { document.getElementById('history-modal').classList.add('hidden'); }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            const orders = JSON.parse(localStorage.getItem('confirmed_orders') || '[]');
            document.getElementById('history-count').innerText = orders.length;
            if(orders.length > 0) document.getElementById('history-count').classList.remove('hidden');
            
            if (orders.length === 0) {
                list.innerHTML = `<div class="text-center py-10 opacity-20"><i class="fas fa-receipt text-4xl mb-2"></i><p class="text-[10px] font-black uppercase">Belum ada pesanan</p></div>`;
                return;
            }

            list.innerHTML = orders.reverse().map(ord => `
                <div class="bg-white p-5 rounded-[32px] border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[9px] font-black text-slate-300 uppercase tracking-tighter">${ord.id}</span>
                            <p class="text-[10px] font-black text-indigo-600 uppercase mt-0.5">${ord.type}</p>
                        </div>
                        <span class="px-2.5 py-1 rounded-full text-[8px] font-black uppercase bg-amber-50 text-amber-600 status-dot">Proses Dapur</span>
                    </div>
                    <div class="space-y-2 mb-4">
                        ${ord.items.map(i => `<div class="flex justify-between text-[10px] font-bold text-slate-700"><span>${i.qty}x ${i.name}</span><span>Rp ${(i.qty*i.price).toLocaleString()}</span></div>`).join('')}
                    </div>
                    <div class="pt-4 border-t border-slate-50 flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-900">Total Rp ${ord.total.toLocaleString()}</span>
                        <div class="w-16 h-1 bg-slate-100 rounded-full overflow-hidden">
                            <div class="w-2/3 h-full bg-amber-400"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function callWaiter() { showToast("Pelayan akan segera ke meja Anda", "fa-concierge-bell"); }
        function requestBill() { showToast("Tagihan sedang disiapkan kasir", "fa-receipt"); }

        async function confirmOrder() {
            if (cart.length === 0) return;
            const newOrder = {
                id: 'TRX' + Math.floor(Math.random()*1000),
                items: [...cart],
                total: cart.reduce((a, b) => a + (b.qty * b.price), 0),
                type: orderType,
                status: 'Diterima',
                timestamp: new Date().toISOString()
            };
            const confirmed = JSON.parse(localStorage.getItem('confirmed_orders') || '[]');
            confirmed.push(newOrder);
            localStorage.setItem('confirmed_orders', JSON.stringify(confirmed));
            
            showToast("Pesanan Terkirim!", "fa-check-circle");
            cart = [];
            saveCart();
            updateCartUI();
            closeCartModal();
            updateHistoryUI();
        }
    </script>
</body>
</html>
