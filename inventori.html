<div class="space-y-8 animate-fadeIn">
    <!-- Header Page -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Inventori Bahan Baku</h3>
            <p class="text-xs font-bold text-slate-400 mt-1">Kelola stok komoditas dan bahan dapur secara real-time</p>
        </div>
        <div class="flex gap-2">
            <button onclick="loadInventoriData()" class="w-12 h-12 bg-white border border-slate-200 text-slate-400 rounded-2xl flex items-center justify-center hover:text-amber-500 transition-all shadow-sm">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button onclick="openAddInvModal()" class="flex items-center justify-center gap-2 bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] tracking-widest shadow-xl active:scale-95 transition-all uppercase">
                <i class="fas fa-plus"></i> Tambah Bahan
            </button>
        </div>
    </div>

    <!-- Quick Search & Filter -->
    <div class="relative max-w-md">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-sm"></i>
        <input type="text" id="inv-search" oninput="filterInventori()" placeholder="Cari nama bahan (misal: Ayam, Beras...)" class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-100 focus:ring-2 focus:ring-amber-400 outline-none text-sm font-medium transition-all shadow-sm">
    </div>

    <!-- Inventory Stats -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="inv-stats">
        <div class="bg-white p-5 rounded-[32px] border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total Komoditas</p>
            <h4 id="stat-total-inv" class="text-xl font-black text-slate-800 mt-1">0</h4>
        </div>
        <div class="bg-white p-5 rounded-[32px] border border-rose-100 shadow-sm relative overflow-hidden group">
            <div class="relative z-10">
                <p class="text-[9px] font-black text-rose-400 uppercase tracking-widest">Stok Menipis</p>
                <h4 id="stat-low-inv" class="text-xl font-black text-rose-600 mt-1">0</h4>
            </div>
            <i class="fas fa-exclamation-triangle absolute -right-2 -bottom-2 text-4xl text-rose-50 opacity-0 group-hover:opacity-100 transition-opacity"></i>
        </div>
        <div class="bg-white p-5 rounded-[32px] border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Status Gudang</p>
            <h4 class="text-[10px] font-black text-emerald-500 mt-2 uppercase tracking-tighter italic">Normal & Terkendali</h4>
        </div>
    </div>

    <!-- Inventory Grid/Table -->
    <div class="bg-white rounded-[40px] border border-slate-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/50 border-b border-slate-100">
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nama Bahan</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Stok</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Satuan</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="inv-table-body" class="divide-y divide-slate-50">
                    <!-- Loading Skeletons -->
                    <tr>
                        <td colspan="5" class="px-8 py-20 text-center">
                            <div class="flex flex-col items-center gap-3">
                                <i class="fas fa-circle-notch animate-spin text-amber-400 text-2xl"></i>
                                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Menyelaraskan data...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Form Inventori -->
<div id="inv-modal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeInvModal()"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-md bg-white rounded-[40px] shadow-2xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h3 id="inv-modal-title" class="text-xl font-black text-slate-800 uppercase tracking-tight">Bahan Baku</h3>
            <button onclick="closeInvModal()" class="text-slate-300 hover:text-slate-500"><i class="fas fa-times"></i></button>
        </div>
        <form id="inv-form" class="space-y-4">
            <input type="hidden" id="inv-id">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Nama Bahan</label>
                <input type="text" id="inv-nama" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-amber-400 text-sm font-semibold">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Stok Saat Ini</label>
                    <input type="number" id="inv-stok" step="0.01" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-amber-400 text-sm font-semibold">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Satuan</label>
                    <input type="text" id="inv-satuan" placeholder="kg, liter, ekor" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-amber-400 text-sm font-semibold">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Batas Minimum (Alert)</label>
                <input type="number" id="inv-min" step="0.01" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border-none focus:ring-2 focus:ring-amber-400 text-sm font-semibold">
            </div>
            <div class="flex items-center gap-3 pt-4">
                <button type="button" onclick="closeInvModal()" class="flex-1 py-4 rounded-2xl bg-slate-100 text-slate-400 font-black text-[10px] tracking-widest uppercase">Batal</button>
                <button type="submit" id="inv-btn-save" class="flex-[2] py-4 rounded-2xl bg-slate-900 text-white font-black text-[10px] tracking-widest uppercase shadow-xl active:scale-95 transition-all">Simpan Data</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwmI9kBYFGuOPH9cnwMK9wuGuYSZcto_EyIW0N2zDTasuW8gkZ8k7PCeVS_PYyzvRgfNg/exec";
    let inventoryItems = [];

    async function loadInventoriData() {
        const body = document.getElementById('inv-table-body');
        try {
            // Turbo Sync: Gunakan getMasterData jika tersedia, atau getInventori
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'getInventori' }) 
            });
            const result = await res.json();
            
            if(result.status === 'success') {
                inventoryItems = result.data;
                renderInvTable(inventoryItems);
                updateInvStats(inventoryItems);
            }
        } catch (e) {
            body.innerHTML = `<tr><td colspan="5" class="px-8 py-10 text-center text-rose-500 font-bold uppercase text-[10px]">Gagal terhubung ke database cloud</td></tr>`;
        }
    }

    function renderInvTable(data) {
        const body = document.getElementById('inv-table-body');
        if(data.length === 0) {
            body.innerHTML = `<tr><td colspan="5" class="px-8 py-10 text-center text-slate-400 font-bold uppercase text-[10px]">Belum ada bahan baku terdaftar</td></tr>`;
            return;
        }

        body.innerHTML = data.map(item => {
            const isLow = parseFloat(item.stok) <= parseFloat(item.min_stok);
            return `
                <tr class="hover:bg-slate-50/50 transition-colors group">
                    <td class="px-8 py-5">
                        <p class="text-sm font-black text-slate-800 uppercase tracking-tight">${item.nama_bahan}</p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">ID: ${item.id}</p>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <p class="text-sm font-black ${isLow ? 'text-rose-600' : 'text-slate-700'} tabular-nums">${item.stok}</p>
                    </td>
                    <td class="px-8 py-5">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${item.satuan}</span>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <span class="px-3 py-1 rounded-full ${isLow ? 'bg-rose-50 text-rose-500 animate-pulse' : 'bg-emerald-50 text-emerald-600'} text-[8px] font-black uppercase tracking-widest">
                            ${isLow ? 'Restock' : 'Aman'}
                        </span>
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button onclick="editInv('${item.id}')" class="w-8 h-8 rounded-xl bg-slate-50 text-slate-400 hover:text-amber-500 hover:bg-amber-50 transition-all flex items-center justify-center text-xs"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteInv('${item.id}')" class="w-8 h-8 rounded-xl bg-slate-50 text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-all flex items-center justify-center text-xs"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function filterInventori() {
        const query = document.getElementById('inv-search').value.toLowerCase();
        const filtered = inventoryItems.filter(item => 
            item.nama_bahan.toLowerCase().includes(query) || 
            item.id.toString().toLowerCase().includes(query)
        );
        renderInvTable(filtered);
    }

    function updateInvStats(data) {
        document.getElementById('stat-total-inv').innerText = data.length;
        document.getElementById('stat-low-inv').innerText = data.filter(i => parseFloat(i.stok) <= parseFloat(i.min_stok)).length;
    }

    // Modal & Form Logic
    function openAddInvModal() {
        document.getElementById('inv-modal-title').innerText = "Tambah Bahan Baru";
        document.getElementById('inv-form').reset();
        document.getElementById('inv-id').value = "";
        document.getElementById('inv-modal').classList.remove('hidden');
    }

    function editInv(id) {
        const item = inventoryItems.find(i => i.id == id);
        if(!item) return;

        document.getElementById('inv-modal-title').innerText = "Edit Bahan Baku";
        document.getElementById('inv-id').value = item.id;
        document.getElementById('inv-nama').value = item.nama_bahan;
        document.getElementById('inv-stok').value = item.stok;
        document.getElementById('inv-satuan').value = item.satuan;
        document.getElementById('inv-min').value = item.min_stok;
        document.getElementById('inv-modal').classList.remove('hidden');
    }

    function closeInvModal() { document.getElementById('inv-modal').classList.add('hidden'); }

    document.getElementById('inv-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('inv-btn-save');
        const id = document.getElementById('inv-id').value;
        const action = id ? 'updateInventori' : 'submitInventori';
        
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-circle-notch animate-spin mr-2"></i> Memproses...`;

        const payload = {
            action: action,
            data: {
                id: id,
                nama_bahan: document.getElementById('inv-nama').value,
                stok: document.getElementById('inv-stok').value,
                satuan: document.getElementById('inv-satuan').value,
                min_stok: document.getElementById('inv-min').value
            }
        };

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.status === 'success') {
                closeInvModal();
                loadInventoriData();
            }
        } catch (err) {
            alert("Kesalahan sinkronisasi cloud.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "Simpan Data";
        }
    });

    async function deleteInv(id) {
        if(!confirm("Hapus bahan baku ini dari inventori?")) return;
        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'deleteInventori', data: { id: id } }) 
            });
            const result = await res.json();
            if(result.status === 'success') loadInventoriData();
        } catch (e) { alert("Gagal menghapus data."); }
    }

    // Load awal
    loadInventoriData();
</script>
